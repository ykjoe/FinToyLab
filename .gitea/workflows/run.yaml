name: Run Application
on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Choose action: run or test'
        required: true
        default: 'run'
        type: choice
        options:
          - run
          - test

jobs:
  run-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        run: |
          python3 --version
          if ! command -v python3 &> /dev/null; then
            echo "Python3 not found. Please run deploy workflow first."
          fi
          python3 -m pip install --upgrade pip

      - name: Install Task
        run: |
          if ! command -v task &> /dev/null; then
            echo "Task not found. Please run deploy workflow first."
          else
            echo "Task is already installed"
          fi

      - name: Run selected action
        run: |
          if [ ! -d .venv ]; then
            echo "Error: Virtual environment not found. Please run deploy workflow first."
            exit 1
          fi
          task ${{ inputs.action }}