version: '3'

vars:
  project_name: fintoylab
  main_file_name: main.py

tasks:
  run:
    desc: Run the main program
    cmds:
      - source .venv/bin/activate
      - python {{.project_name}}/{{.main_file_name}}

  check-format:
    desc: Auto-format code with Ruff
    cmds:
      - .venv/bin/ruff format {{.project_name}} tests

  check:
    desc: Run static analysis (Ruff + Mypy) & try to fix some bug
    cmds:
      - .venv/bin/ruff check --fix {{.project_name}} tests
      - .venv/bin/mypy {{.project_name}}
    ignore_error: true

  check-only:
    desc: Check and fix error if ruff can
    cmds:
      - .venv/bin/ruff check {{.project_name}} tests
      - .venv/bin/mypy {{.project_name}}

  test:
    desc: Run tests
    cmds:
      - source .venv/bin/activate
      - pytest tests/

  deploy:
    desc: Deploy the application (placeholder)
    cmds:
      - |
        if [ ! -d .venv ]; then
          echo "$(date) | Create virtual environment"
          python -m venv .venv
        else
          echo "$(date) | Virtual environment already exists, run 'task clean' to remove it if you want to recreate."
        fi
      - source .venv/bin/activate 
      - pip install --upgrade pip
      - pip install -e .
      - pip install -r requirements.txt
      - cmd: echo "$(date) | {{.project_name}} Deployed!"
        silent: true

  clean-tests:
    desc: Clean up test logs
    cmds:
      - rm -rf .pytest_cache
      - rm -rf tests/logs

  clean:
    desc: Clean up generated files
    cmds:
      - find ./{{.project_name}} -name "__pycache__" | xargs rm -rf
      - find ./tests -name "__pycache__" | xargs rm -rf
      - rm -rf __pycache__ *.pyc *.pyo
      - rm -rf .pytest_cache
      - rm -rf dist build *.egg-info
      - rm -rf logs/

  clean-all:
    desc: Clean up all files, include environments
    cmds:
      - task clean
      - rm -rf .mypy_cache .ruff_cache .venv