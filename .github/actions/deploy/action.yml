name: 'FinCapLab Standard Deploy'
description: 'Checkout, cache task/venv, and run task deploy'

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Task
      uses: arduino/setup-task@v2
      with:
        version: 3.x

    - name: Cache Virtualenv
      id: cache-venv
      uses: actions/cache@v3
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ hashFiles('requirements.txt', 'Taskfile.yml') }}
        restore-keys: |
          venv-${{ runner.os }}-

    - name: Deploy application
      shell: bash
      run: task deploy